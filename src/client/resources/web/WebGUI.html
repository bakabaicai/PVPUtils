<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>PVPUtils WebGUI</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --accent: #8cf06f;
      --accent-2: #58d7ff;
      --success: #54e88f;
      --danger: #ff6464;
      --bg: #06090b;
      --surface: rgba(12, 18, 22, .86);
      --panel: rgba(18, 26, 31, .92);
      --card: rgba(21, 31, 37, .86);
      --border: rgba(140, 240, 111, .16);
      --border-strong: rgba(140, 240, 111, .32);
      --text: #edf7ee;
      --muted: #82908a;
      --faint: rgba(255, 255, 255, .055);
      --font-display: "Trebuchet MS", "Segoe UI Variable Display", "Microsoft YaHei UI", sans-serif;
      --font-body: "Verdana", "Microsoft YaHei UI", sans-serif;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(140, 240, 111, .20), transparent 28rem),
        radial-gradient(circle at 80% 8%, rgba(88, 215, 255, .16), transparent 24rem),
        radial-gradient(circle at 50% 100%, rgba(140, 240, 111, .08), transparent 26rem),
        linear-gradient(135deg, #030506, var(--bg));
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 4px;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .42;
      will-change: contents;
    }

    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(5, 9, 11, .82);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(22px) saturate(1.35);
      will-change: transform;
      animation: topbar-in .55s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes topbar-in {
      from {
        opacity: 0;
        transform: translateY(-100%);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: background .16s ease, color .16s ease, transform .16s ease;
    }

    .icon-btn:hover {
      color: var(--text);
      background: var(--faint);
    }

    .icon-btn:active {
      transform: scale(.92);
    }

    .icon-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      color: #07100a;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .12), 0 0 28px rgba(140, 240, 111, .16);
      will-change: box-shadow;
      animation: logo-pulse 3s ease-in-out infinite;
    }

    .logo-mark::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .35), transparent 58%);
    }

    @keyframes logo-pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(140, 240, 111, 0), 0 0 28px rgba(140, 240, 111, .16);
      }
      50% {
        box-shadow: 0 0 0 7px rgba(140, 240, 111, .10), 0 0 40px rgba(88, 215, 255, .18);
      }
    }

    .brand-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 15px;
      letter-spacing: .08em;
      line-height: 1;
      color: #fff;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: .18em;
      line-height: 1;
    }

    .spacer {
      flex: 1;
    }

    .connection {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .06em;
    }

    #conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .25s ease, box-shadow .25s ease;
    }

    #search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      height: 34px;
      background: rgba(0, 0, 0, .24);
      transition: border-color .2s ease;
      max-width: 220px;
    }

    #search-bar:focus-within {
      border-color: var(--border-strong);
    }

    #search-bar svg {
      flex-shrink: 0;
      color: var(--muted);
    }

    #search-input {
      border: 0;
      background: transparent;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 12px;
      outline: none;
      width: 100%;
      min-width: 0;
    }

    #search-input::placeholder {
      color: var(--muted);
    }

    #search-clear {
      display: none;
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 50%;
      background: var(--faint);
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      padding: 0;
      flex-shrink: 0;
    }

    #search-clear:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .1);
    }

    #search-clear.show {
      display: block;
    }

    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 25;
      width: 232px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(10, 15, 18, .96);
      border-right: 1px solid var(--border);
      will-change: transform;
      transform: translateX(-100%);
      transition: transform .35s cubic-bezier(.22, 1, .36, 1);
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #sidebar-head {
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    #category {
      list-style: none;
      padding: 12px 9px;
      margin: 0;
      overflow-y: auto;
      flex: 1;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 11px;
      min-height: 34px;
      padding: 8px 11px;
      border-radius: 10px;
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color .16s ease, background .16s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text);
      background: rgba(140, 240, 111, .08);
    }

    .nav-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 24;
      background: rgba(0, 0, 0, .58);
      backdrop-filter: blur(2px);
    }

    #sidebar-overlay.open {
      display: block;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 78px 22px 44px;
    }

    #cat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateX(-10px);
      animation: header-in .45s ease .15s forwards;
    }

    @keyframes header-in {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .header-line {
      width: 3px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
    }

    h1 {
      margin: 0;
      color: #fff;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    #module-count {
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--faint);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .1em;
    }

    #point {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(228px, 1fr));
      gap: 14px;
    }

    .module-card {
      min-height: 142px;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: var(--card);
      position: relative;
      opacity: 0;
      transform: translateY(18px);
      will-change: transform, opacity;
      animation: card-in .45s cubic-bezier(.22, 1, .36, 1) forwards;
      transition: border-color .22s ease, transform .22s ease, box-shadow .22s ease;
      cursor: pointer;
    }

    .module-card > .card-shimmer {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      pointer-events: none;
    }

    .module-card > .card-shimmer::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 35%, rgba(140, 240, 111, .08) 50%, transparent 65%);
      background-size: 220% 100%;
      opacity: 0;
      transition: opacity .25s ease;
    }

    .module-card.enabled:hover > .card-shimmer::before {
      opacity: 1;
      animation: shimmer 2.6s linear infinite;
    }

    .module-card:hover {
      transform: translateY(-3px);
      border-color: var(--border-strong);
      box-shadow: 0 14px 38px rgba(0, 0, 0, .32);
    }

    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      from {
        background-position: 220% 0;
      }
      to {
        background-position: -220% 0;
      }
    }

    .module-title {
      position: relative;
      z-index: 1;
      margin-bottom: 8px;
      color: #fff;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: .035em;
    }

    .module-desc {
      position: relative;
      z-index: 1;
      min-height: 40px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .card-footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
    }

    .card-expand-panel {
      display: none;
    }

    .card-chevron {
      position: absolute;
      z-index: 2;
      top: 14px;
      right: 14px;
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      color: var(--muted);
      transition: transform .25s cubic-bezier(.22, 1, .36, 1), color .18s ease;
    }

    .module-card:hover .card-chevron {
      color: var(--text);
    }

    #morph-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(0, 0, 0, .58);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity .3s ease;
    }

    #morph-backdrop.open {
      display: block;
      opacity: 1;
    }

    #morph-panel {
      position: fixed;
      z-index: 51;
      background: var(--panel);
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      overflow: hidden;
      display: none;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .55);
      transition: top .32s cubic-bezier(.22, 1, .36, 1),
                  left .32s cubic-bezier(.22, 1, .36, 1),
                  width .32s cubic-bezier(.22, 1, .36, 1),
                  height .32s cubic-bezier(.22, 1, .36, 1),
                  border-radius .32s cubic-bezier(.22, 1, .36, 1);
    }

    #morph-panel.open {
      display: flex;
      flex-direction: column;
    }

    #morph-panel.animating {
      display: flex;
      flex-direction: column;
    }

    .morph-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .morph-head-line {
      width: 3px;
      height: 22px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      flex-shrink: 0;
    }

    .morph-head-info {
      flex: 1;
      min-width: 0;
    }

    .morph-head-eyebrow {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .morph-head-title {
      color: #fff;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 17px;
      letter-spacing: .04em;
    }

    .morph-head-status {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .morph-head-toggle {
      flex-shrink: 0;
    }

    .morph-close {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .16s ease, color .16s ease;
    }

    .morph-close:hover {
      color: var(--text);
      background: var(--faint);
    }

    .morph-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s ease .1s, transform .25s ease .1s;
    }

    #morph-panel.open .morph-body {
      opacity: 1;
      transform: translateY(0);
    }

    .morph-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
      padding-bottom: 4px;
    }

    .status-pill {
      border-radius: 999px;
      padding: 4px 9px;
      background: var(--faint);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .status-pill.on {
      color: var(--accent);
      background: rgba(140, 240, 111, .10);
    }

    .toggle-wrap {
      position: relative;
      display: inline-flex;
    }

    .toggle-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      width: 40px;
      height: 22px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--faint);
      cursor: pointer;
      position: relative;
      transition: background .22s ease, border-color .22s ease;
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--muted);
      will-change: transform;
      transition: transform .24s cubic-bezier(.34, 1.56, .64, 1), background .22s ease;
    }

    .toggle-input:checked ~ .toggle-track {
      border-color: var(--accent);
      background: rgba(140, 240, 111, .16);
    }

    .toggle-input:checked ~ .toggle-track .toggle-thumb {
      transform: translateX(18px);
      background: var(--accent);
    }

    .toggle-input:focus-visible ~ .toggle-track {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--faint) 25%, rgba(255,255,255,.06) 50%, var(--faint) 75%);
      background-size: 200% 100%;
      animation: skeleton-pulse 1.5s ease-in-out infinite;
      border-radius: 8px;
    }

    @keyframes skeleton-pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      min-height: 142px;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: var(--card);
    }

    .skeleton-title {
      width: 60%;
      height: 16px;
      margin-bottom: 12px;
    }

    .skeleton-desc {
      width: 90%;
      height: 12px;
      margin-bottom: 6px;
    }

    .skeleton-desc-short {
      width: 45%;
      height: 12px;
    }

    .skeleton-pill {
      width: 50px;
      height: 20px;
      border-radius: 999px;
    }

    .skeleton-toggle {
      width: 40px;
      height: 22px;
      border-radius: 999px;
    }

    .skeleton-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    #no-results {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .04em;
    }

    #no-results svg {
      display: block;
      margin: 0 auto 14px;
      opacity: .4;
    }

    #toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 60;
      max-width: 300px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 15px;
      background: var(--panel);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity .22s ease, transform .22s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .setting-row {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .command-card {
      min-height: 170px;
      display: flex;
      flex-direction: column;
    }

    .command-input {
      position: relative;
      z-index: 2;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 10px 12px;
      color: var(--text);
      background: rgba(0, 0, 0, .24);
      outline: none;
      font-family: var(--font-body);
      margin-top: 12px;
      margin-bottom: 16px;
    }

    .command-input:focus {
      border-color: var(--border-strong);
    }

    .command-button {
      border: 0;
      border-radius: 10px;
      padding: 9px 14px;
      color: #07100a;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 800;
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease;
    }

    .command-button:hover {
      opacity: .9;
      transform: translateY(-1px);
    }

    .command-button:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .setting-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .setting-name {
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .setting-value {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: .06em;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      outline: none;
      appearance: none;
      background: var(--faint);
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(140, 240, 111, .14);
      cursor: pointer;
    }

    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 11px;
      color: var(--text);
      background: rgba(0, 0, 0, .24);
      outline: none;
      font-family: var(--font-body);
    }

    @media (max-width: 640px) {
      #topbar {
        padding: 0 12px;
      }

      .connection {
        display: none;
      }

      #search-bar {
        max-width: 140px;
      }

      main {
        padding-inline: 14px;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="topbar">
    <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <line x1="2" y1="4" x2="14" y2="4"></line>
        <line x1="2" y1="8" x2="11" y2="8"></line>
        <line x1="2" y1="12" x2="14" y2="12"></line>
      </svg>
    </button>
    <div class="brand">
      <div class="logo-mark">P</div>
      <div>
        <div class="brand-title">PVPUtils</div>
        <div class="brand-subtitle">WEBGUI</div>
      </div>
    </div>
    <div class="spacer"></div>
    <div id="search-bar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">

  <script>

          { name: 'items', displayName: 'Show Items', type: 'checkbox', value: false },
          { name: 'color', displayName: 'Color', type: 'selection', values: ['Red', 'Green', 'Blue', 'Rainbow'], value: 'Green' },

          { name: 'delay', displayName: 'Delay', type: 'slider', min: 0, max: 4, step: 1, value: 0 }

        blink: [
          { name: 'maxPackets', displayName: 'Max Packets', type: 'slider', min: 10, max: 500, step: 10, value: 200 }
        ]

    };

    function mockFetch(url) {
      const u = new URL(url, location.origin);
      const path = u.pathname;
      const params = u.searchParams;
      return new Promise(resolve => {
        setTimeout(() => {
          if (path === '/api/ping') {
            resolve({ json: () => Promise.resolve({ ok: true }) });
          } else if (path === '/api/categoriesList') {
            resolve({ json: () => Promise.resolve({ success: true, result: MOCK.categories }) });
          } else if (path === '/api/modulesList') {
            const cat = params.get('category') || 'Combat';
            resolve({ json: () => Promise.resolve({ success: true, result: MOCK.modules[cat] || [] }) });
          } else if (path === '/api/commandsList') {
            resolve({ json: () => Promise.resolve({ success: true, result: MOCK.modules.Command }) });
          } else if (path === '/api/setStatus') {
            const mod = params.get('module');
            const state = params.get('state') === 'true';
            for (const cat of Object.values(MOCK.modules)) {
              const m = cat.find(x => x.id === mod);
              if (m) { m.state = state; break; }
            }
            resolve({ json: () => Promise.resolve({ success: true, result: state }) });
          } else if (path === '/api/getModuleSetting') {
            const mod = params.get('module');
            resolve({ json: () => Promise.resolve({ success: true, result: MOCK.settings[mod] || [] }) });
          } else if (path === '/api/setModuleSettingValue') {
            const mod = params.get('module');
            const name = params.get('name');
            const value = params.get('value');
            const settings = MOCK.settings[mod];
            if (settings) {
              const s = settings.find(x => x.name === name);
              if (s) {
                if (s.type === 'slider') s.value = parseFloat(value);
                else if (s.type === 'checkbox') s.value = value === 'true';
                else s.value = value;
              }
            }
            resolve({ json: () => Promise.resolve({ success: true }) });
          } else if (path === '/api/executeCommand') {
            resolve({ json: () => Promise.resolve({ success: true }) });
          } else {
            resolve({ json: () => Promise.resolve({ success: false, reason: 'Unknown API' }) });
          }
        }, 80);
      });
    }

    function apiFetch(url) {
      return testMode ? mockFetch(url) : fetch(url);
    }

    function toggleTestMode() {
      testMode = !testMode;
      const btn = $('test-toggle');
      const brandSub = document.querySelector('.brand-subtitle');
      if (testMode) {
        btn.style.color = 'var(--accent)';
        btn.style.background = 'rgba(140, 240, 111, .12)';
        brandSub.textContent = 'WEBGUI · TEST MODE';
        toast('Test mode enabled - using mock data');
      } else {
        btn.style.color = 'var(--muted)';
        btn.style.background = 'transparent';
        brandSub.textContent = 'WEBGUI';
        toast('Test mode disabled - using live API');
      }
      loadCategories(false);
    }

    function openSidebar() {
      $('sidebar').classList.add('open');
      $('sidebar-overlay').classList.add('open');
      $('sidebar').querySelector('.nav-link')?.focus();
    }

    function closeSidebar() {
      $('sidebar').classList.remove('open');
      $('sidebar-overlay').classList.remove('open');
    }

    $('sidebar-toggle').onclick = () => {
      $('sidebar').classList.contains('open') ? closeSidebar() : openSidebar();
    };

    function toast(message, danger = false) {
      const node = $('toast');
      node.textContent = message;
      node.style.borderColor = danger ? 'rgba(255, 100, 100, .4)' : 'var(--border)';
      node.style.color = danger ? 'var(--danger)' : 'var(--text)';
      node.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => node.classList.remove('show'), 2600);
    }

    $('toast').onclick = () => $('toast').classList.remove('show');

    function setConnected(connected) {
      const dot = $('conn-dot');
      dot.style.background = connected ? 'var(--success)' : 'var(--danger)';
      dot.style.boxShadow = connected ? '0 0 12px rgba(84, 232, 143, .45)' : '0 0 12px rgba(255, 100, 100, .35)';
      const text = $('conn-text');
      text.textContent = connected ? 'connected' : 'disconnected';
      text.style.color = connected ? 'var(--success)' : 'var(--danger)';
    }

    function refreshStatus() {
      const icon = $('refresh-icon');
      icon.style.transition = 'transform .45s ease';
      icon.style.transform = 'rotate(360deg)';
      setTimeout(() => { icon.style.transition = 'none'; icon.style.transform = 'rotate(0deg)'; }, 460);
      ping();
    }

    $('search-input').oninput = function() {
      searchQuery = this.value.trim().toLowerCase();
      $('search-clear').classList.toggle('show', searchQuery.length > 0);
      clearTimeout(searchTimer);
      searchTimer = setTimeout(filterCurrentView, 150);
    };

    $('search-clear').onclick = function() {
      $('search-input').value = '';
      searchQuery = '';
      this.classList.remove('show');
      filterCurrentView();
      $('search-input').focus();
    };

    function filterCurrentView() {
      if (currentCategory === 'Command') {
        filterCommandCards();
        return;
      }
      filterModuleCards();
    }

    function filterModuleCards() {
      const cards = $('point').querySelectorAll('.module-card');
      let visible = 0;
      cards.forEach(card => {
        const title = (card.querySelector('.module-title')?.textContent || '').toLowerCase();
        const desc = (card.querySelector('.module-desc')?.textContent || '').toLowerCase();
        const match = !searchQuery || title.includes(searchQuery) || desc.includes(searchQuery);
        card.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      $('no-results').style.display = visible === 0 ? 'block' : 'none';
    }

    function filterCommandCards() {
      const cards = $('point').querySelectorAll('.module-card');
      let visible = 0;
      cards.forEach(card => {
        const title = (card.querySelector('.module-title')?.textContent || '').toLowerCase();
        const desc = (card.querySelector('.module-desc')?.textContent || '').toLowerCase();
        const match = !searchQuery || title.includes(searchQuery) || desc.includes(searchQuery);
        card.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      $('no-results').style.display = visible === 0 ? 'block' : 'none';
    }

    function buildSkeleton(count) {
      const frag = document.createDocumentFragment();
      for (let i = 0; i < count; i++) {
        const card = document.createElement('section');
        card.className = 'skeleton-card';
        card.innerHTML =
          '<div class="skeleton skeleton-title"></div>' +
          '<div class="skeleton skeleton-desc"></div>' +
          '<div class="skeleton skeleton-desc-short"></div>' +
          '<div class="skeleton-footer" style="margin-top:auto;padding-top:16px">' +
          '<div class="skeleton skeleton-pill"></div>' +
          '<div class="skeleton skeleton-toggle"></div>' +
          '</div>';
        frag.appendChild(card);
      }
      return frag;
    }

    function addCategory(category) {
      const item = document.createElement('li');
      const link = document.createElement('a');
      link.className = 'nav-link';
      link.href = '#' + category.id;
      link.dataset.cat = category.id;
      link.tabIndex = 0;
      link.innerHTML = '<span class="nav-dot"></span><span>' + category.name + '</span>';
      link.onclick = event => {
        event.preventDefault();
        renderCategory(category.id);
        closeSidebar();
      };
      link.onkeydown = event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          renderCategory(category.id);
          closeSidebar();
        }
      };
      item.appendChild(link);
      $('category').appendChild(item);
    }

    function renderCategory(name, animate = true) {
      currentCategory = name;
      $('no-results').style.display = 'none';
      searchQuery = '';
      $('search-input').value = '';
      $('search-clear').classList.remove('show');
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.cat === name);
      });
      const category = categories.find(item => item.id === name);
      $('cat-title').textContent = category ? category.name : name;
      const grid = $('point');
      if (name === 'Command') {
        renderCommandPage(animate);
        return;
      }
      grid.innerHTML = '';
      grid.appendChild(buildSkeleton(6));
      $('module-count').textContent = 'loading...';
      apiFetch('/api/modulesList?token=' + encodeURIComponent(token) + '&category=' + encodeURIComponent(name))
        .then(response => response.json())
        .then(value => {
          if (!value.success) {
            toast(value.reason || 'Failed to load modules.', true);
            grid.innerHTML = '';
            return;
          }
          const list = value.result || [];
          $('module-count').textContent = list.length + ' modules';
          categoryDataCache[name] = list;
          grid.innerHTML = '';
          if (!list.length) {
            $('no-results').style.display = 'block';
            return;
          }
          const frag = document.createDocumentFragment();
          list.forEach((mod, index) => frag.appendChild(buildModuleCard(mod, index, animate)));
          grid.appendChild(frag);
        })
        .catch(() => {
          setConnected(false);
          toast('Failed to load modules.', true);
          grid.innerHTML = '';
        });
    }

    function renderCommandPage(animate = true) {
      const grid = $('point');
      grid.innerHTML = '';
      grid.appendChild(buildSkeleton(4));
      $('module-count').textContent = 'loading...';
      apiFetch('/api/commandsList?token=' + encodeURIComponent(token))
        .then(response => response.json())
        .then(value => {
          if (!value.success) {
            toast(value.reason || 'Failed to load commands.', true);
            grid.innerHTML = '';
            return;
          }
          const list = value.result || [];
          $('module-count').textContent = list.length + ' commands';
          grid.innerHTML = '';
          if (!list.length) {
            $('no-results').style.display = 'block';
            return;
          }
          const frag = document.createDocumentFragment();
          list.forEach((command, index) => frag.appendChild(buildCommandCard(command, index, animate)));
          grid.appendChild(frag);
        })
        .catch(() => {
          setConnected(false);
          toast('Failed to load commands.', true);
          grid.innerHTML = '';
        });
    }

    function buildCommandCard(command, index, animate = true) {
      const card = document.createElement('section');
      card.className = 'module-card command-card';
      if (animate) {
        card.style.animationDelay = (index * 45) + 'ms';
      } else {
        card.style.animation = 'none';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }
      const input = command.requiresInput
        ? '<input class="command-input" type="' + escapeHtml(command.inputType || 'text') + '" value="' + escapeHtml(command.value || '') + '" placeholder="' + escapeHtml(command.placeholder || '') + '">'
        : '';
      card.innerHTML =
        '<div class="module-title">' + escapeHtml(command.name) + '</div>' +
        '<div class="module-desc">' + escapeHtml(command.desc || '') + '</div>' +
        input +
        '<div class="card-footer"><span class="status-pill">command</span><button class="command-button">Execute</button></div>';
      const button = card.querySelector('.command-button');
      const inputNode = card.querySelector('.command-input');
      if (inputNode) {
        inputNode.onkeydown = event => {
          if (event.key === 'Enter') {
            event.preventDefault();
            button.click();
          }
        };
      }
      button.onclick = () => {
        executeWebCommand(command.id, inputNode ? inputNode.value : '', button);
      };
      return card;
    }

    function executeWebCommand(id, value, button) {
      button.disabled = true;
      apiFetch('/api/executeCommand?token=' + encodeURIComponent(token) + '&id=' + encodeURIComponent(id) + '&value=' + encodeURIComponent(value))
        .then(response => response.json())
        .then(result => {
          if (!result.success) {
            toast(result.reason || 'Failed to execute command.', true);
            return;
          }
          toast('Command sent successfully!');
        })
        .catch(() => {
          setConnected(false);
          toast('Failed to execute command.', true);
        })
        .finally(() => {
          button.disabled = false;
        });
    }

    function buildModuleCard(mod, index, animate = true) {
      const card = document.createElement('section');
      card.className = 'module-card' + (mod.state ? ' enabled' : '');
      if (animate) {
        card.style.animationDelay = (index * 45) + 'ms';
      } else {
        card.style.animation = 'none';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }
      card.dataset.module = mod.id;

      const shimmer = document.createElement('div');
      shimmer.className = 'card-shimmer';
      card.appendChild(shimmer);

      const chevron = document.createElement('div');
      chevron.className = 'card-chevron';
      chevron.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4.5L6 8L9.5 4.5"></path></svg>';
      card.appendChild(chevron);

      const main = document.createElement('div');
      main.className = 'card-main';
      const footer = mod.toggleable === false
        ? '<div class="card-footer"><span class="status-pill">settings</span></div>'
        : '<div class="card-footer">' +
        '<span class="status-pill ' + (mod.state ? 'on' : 'off') + '">' + (mod.state ? 'enabled' : 'disabled') + '</span>' +
        '<label class="toggle-wrap" onclick="event.stopPropagation()"><input class="toggle-input" type="checkbox" ' + (mod.state ? 'checked' : '') + ' aria-label="Toggle ' + escapeHtml(mod.name) + '"><span class="toggle-track"><span class="toggle-thumb"></span></span></label>' +
        '</div>';
      main.innerHTML =
        '<div class="module-title">' + escapeHtml(mod.name) + '</div>' +
        '<div class="module-desc">' + escapeHtml(mod.desc || '') + '</div>' +
        footer;
      card.appendChild(main);

      const input = card.querySelector('.toggle-input');
      if (input) input.onchange = () => setModuleState(card, mod.id, input.checked);

      card.addEventListener('click', event => {
        if (event.target.closest('.toggle-wrap') || event.target.closest('.toggle-track')) return;
        openMorph(card, mod);
      });

      return card;
    }

    let morphModule = null;
    let morphSourceRect = null;

    function openMorph(card, mod) {
      morphModule = mod;
      morphSourceRect = card.getBoundingClientRect();
      const panel = $('morph-panel');
      const backdrop = $('morph-backdrop');

      panel.querySelector('.morph-head-title').textContent = mod.name;
      panel.querySelector('.morph-head-eyebrow').textContent = mod.settings ? 'Module Settings' : 'Module';

      const status = panel.querySelector('#morph-status');
      status.className = 'morph-head-status' + (mod.state ? ' on' : '');
      status.textContent = mod.state ? 'enabled' : 'disabled';

      const toggle = panel.querySelector('#morph-toggle');
      toggle.checked = !!mod.state;
      toggle.onchange = () => {
        setModuleState(card, mod.id, toggle.checked);
        const enabled = toggle.checked;
        status.className = 'morph-head-status' + (enabled ? ' on' : '');
        status.textContent = enabled ? 'enabled' : 'disabled';
      };

      const body = panel.querySelector('#morph-body');
      body.innerHTML = '';

      if (mod.desc) {
        const desc = document.createElement('div');
        desc.className = 'morph-desc';
        desc.textContent = mod.desc;
        body.appendChild(desc);
      }

      if (mod.settings) {
        body.innerHTML += '<div class="setting-name" style="color:var(--muted);font-size:11px">Loading settings...</div>';
      } else {
        body.innerHTML += '<div class="setting-name" style="color:var(--muted);font-size:11px">No settings available.</div>';
      }

      panel.style.transition = 'none';
      panel.style.top = morphSourceRect.top + 'px';
      panel.style.left = morphSourceRect.left + 'px';
      panel.style.width = morphSourceRect.width + 'px';
      panel.style.height = morphSourceRect.height + 'px';
      panel.style.borderRadius = '18px';
      panel.classList.add('animating');
      panel.style.display = 'flex';

      backdrop.style.display = 'block';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          backdrop.classList.add('open');
          panel.style.transition = '';
          panel.style.top = '24px';
          panel.style.left = '24px';
          panel.style.width = 'calc(100vw - 48px)';
          panel.style.height = 'calc(100vh - 48px)';
          panel.style.borderRadius = '22px';
          panel.classList.add('open');
          panel.classList.remove('animating');
        });
      });

      if (mod.settings) {
        loadMorphSettings(mod.id, body);
      }

      document.addEventListener('keydown', morphKeyHandler);
    }

    function closeMorph() {
      const panel = $('morph-panel');
      const backdrop = $('morph-backdrop');
      if (!morphSourceRect || !panel.classList.contains('open')) return;

      panel.style.transition = '';
      panel.style.top = morphSourceRect.top + 'px';
      panel.style.left = morphSourceRect.left + 'px';
      panel.style.width = morphSourceRect.width + 'px';
      panel.style.height = morphSourceRect.height + 'px';
      panel.style.borderRadius = '18px';
      backdrop.classList.remove('open');

      const onEnd = () => {
        panel.style.display = 'none';
        panel.classList.remove('open');
        backdrop.style.display = 'none';
        panel.removeEventListener('transitionend', onEnd);
        morphModule = null;
        morphSourceRect = null;
      };
      panel.addEventListener('transitionend', onEnd, { once: true });
      setTimeout(onEnd, 400);

      document.removeEventListener('keydown', morphKeyHandler);
    }

    function morphKeyHandler(event) {
      if (event.key === 'Escape') closeMorph();
    }

    function loadMorphSettings(moduleId, body) {
      apiFetch('/api/getModuleSetting?token=' + encodeURIComponent(token) + '&module=' + encodeURIComponent(moduleId))
        .then(response => response.json())
        .then(value => {
          if (!value.success || !value.result || !value.result.length) {
            const loading = body.querySelector('.setting-name');
            if (loading) loading.textContent = 'No settings available.';
            return;
          }
          const loading = body.querySelector('.setting-name');
          if (loading) loading.remove();
          const frag = document.createDocumentFragment();
          value.result.forEach(setting => frag.appendChild(buildInlineSettingControl(moduleId, setting)));
          body.appendChild(frag);
        })
        .catch(() => {
          const loading = body.querySelector('.setting-name');
          if (loading) {
            loading.textContent = 'Failed to load settings.';
            loading.style.color = 'var(--danger)';
          }
        });
    }

    function buildInlineSettingControl(moduleId, setting) {
      const row = document.createElement('div');
      row.className = 'setting-row';
      if (setting.type === 'checkbox') {
        row.innerHTML =
          '<div class="setting-line">' +
          '<span class="setting-name">' + escapeHtml(setting.displayName) + '</span>' +
          '<label class="toggle-wrap"><input class="toggle-input" type="checkbox" ' + (setting.value ? 'checked' : '') + ' aria-label="' + escapeHtml(setting.displayName) + '"><span class="toggle-track"><span class="toggle-thumb"></span></span></label>' +
          '</div>';
        const input = row.querySelector('input');
        input.onchange = () => setSettingValue(moduleId, setting.name, input.checked, input);
      } else if (setting.type === 'slider') {
        row.innerHTML =
          '<div class="setting-line">' +
          '<span class="setting-name">' + escapeHtml(setting.displayName) + '</span>' +
          '<span class="setting-value">' + escapeHtml(setting.value) + '</span>' +
          '</div>' +
          '<input type="range" min="' + setting.min + '" max="' + setting.max + '" step="' + setting.step + '" value="' + setting.value + '">';
        const input = row.querySelector('input');
        const valueSpan = row.querySelector('.setting-value');
        let commitTimer = null;
        input.oninput = () => {
          valueSpan.textContent = input.value;
          clearTimeout(commitTimer);
          commitTimer = setTimeout(() => setSettingValue(moduleId, setting.name, input.value, input), 300);
        };
      } else if (setting.type === 'selection') {
        row.innerHTML =
          '<div class="setting-line"><span class="setting-name">' + escapeHtml(setting.displayName) + '</span></div>' +
          '<select aria-label="' + escapeHtml(setting.displayName) + '">' + (setting.values || []).map(option => '<option value="' + escapeHtml(option) + '"' + (option === setting.value ? ' selected' : '') + '>' + escapeHtml(option) + '</option>').join('') + '</select>';
        const select = row.querySelector('select');
        select.onchange = () => setSettingValue(moduleId, setting.name, select.value, select);
      }
      return row;
    }

    function setModuleState(card, moduleId, state) {
      const input = card.querySelector('.toggle-input');
      const pill = card.querySelector('.status-pill');
      input.disabled = true;
      apiFetch('/api/setStatus?token=' + encodeURIComponent(token) + '&module=' + encodeURIComponent(moduleId) + '&state=' + encodeURIComponent(state))
        .then(response => response.json())
        .then(value => {
          if (!value.success) {
            input.checked = !state;
            toast(value.reason || 'Failed to update module.', true);
            return;
          }
          const enabled = !!value.result;
          input.checked = enabled;
          card.classList.toggle('enabled', enabled);
          pill.className = 'status-pill ' + (enabled ? 'on' : 'off');
          pill.textContent = enabled ? 'enabled' : 'disabled';
        })
        .catch(() => {
          input.checked = !state;
          setConnected(false);
          toast('Failed to update module.', true);
        })
        .finally(() => {
          input.disabled = false;
        });
    }

    function updateModuleCard(card, mod) {
      const title = card.querySelector('.module-title');
      if (title) title.textContent = mod.name;
      const desc = card.querySelector('.module-desc');
      if (desc) desc.textContent = mod.desc || '';
      const input = card.querySelector('.toggle-input');
      const pill = card.querySelector('.status-pill');
      if (!input) return;
      const enabled = !!mod.state;
      input.checked = enabled;
      card.classList.toggle('enabled', enabled);
      pill.className = 'status-pill ' + (enabled ? 'on' : 'off');
      pill.textContent = enabled ? 'enabled' : 'disabled';
    }

    function setSettingValue(moduleId, name, value, input) {
      input.disabled = true;
      apiFetch('/api/setModuleSettingValue?token=' + encodeURIComponent(token) + '&module=' + encodeURIComponent(moduleId) + '&name=' + encodeURIComponent(name) + '&value=' + encodeURIComponent(value))
        .then(response => response.json())
        .then(result => {
          if (!result.success) {
            toast(result.reason || 'Failed to update setting.', true);
            return;
          }
          syncCurrentCategory();
        })
        .catch(() => {
          setConnected(false);
          toast('Failed to update setting.', true);
        })
        .finally(() => {
          input.disabled = false;
        });
    }

    function syncCurrentCategory() {
      if (currentCategory === 'Command') {
        if (document.activeElement && document.activeElement.classList.contains('command-input')) {
          return;
        }
        renderCommandPage(false);
        return;
      }
      apiFetch('/api/modulesList?token=' + encodeURIComponent(token) + '&category=' + encodeURIComponent(currentCategory))
        .then(response => response.json())
        .then(value => {
          if (!value.success) return;
          const list = value.result || [];
          $('module-count').textContent = list.length + ' modules';
          const grid = $('point');
          const existing = new Map();
          grid.querySelectorAll('.module-card').forEach(card => existing.set(card.dataset.module, card));
          const currentIds = Array.from(existing.keys()).join('|');
          const nextIds = list.map(mod => mod.id).join('|');
          if (currentIds !== nextIds) {
            grid.innerHTML = '';
            const frag = document.createDocumentFragment();
            list.forEach((mod, index) => frag.appendChild(buildModuleCard(mod, index, false)));
            grid.appendChild(frag);
            return;
          }
          list.forEach(mod => {
            const card = existing.get(mod.id);
            if (card) updateModuleCard(card, mod);
          });
          if (searchQuery) filterModuleCards();
        })
        .catch(() => setConnected(false));
    }

    function loadCategories(silent = false) {
      apiFetch('/api/categoriesList?token=' + encodeURIComponent(token))
        .then(response => response.json())
        .then(value => {
          if (!value.success) {
            if (!silent) toast(value.reason || 'Failed to load categories.', true);
            return;
          }
          const previousCategory = currentCategory;
          categories = value.result || [];
          const nextSignature = categories.map(item => item.id + ':' + item.name).join('|');
          if (nextSignature !== categorySignature) {
            categorySignature = nextSignature;
            const list = $('category');
            list.innerHTML = '';
            categories.forEach(addCategory);
          }
          currentCategory = categories.some(item => item.id === previousCategory)
            ? previousCategory
            : (categories[0] ? categories[0].id : 'Combat');
          const category = categories.find(item => item.id === currentCategory);
          $('cat-title').textContent = category ? category.name : currentCategory;
          document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.toggle('active', link.dataset.cat === currentCategory);
          });
          if (silent) {
            syncCurrentCategory();
          } else {
            renderCategory(currentCategory, true);
          }
        })
        .catch(() => {
          setConnected(false);
          if (!silent) toast('Failed to load categories.', true);
        });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function ping() {
      apiFetch('/api/ping?token=' + encodeURIComponent(token))
        .then(response => response.json())
        .then(value => {
          setConnected(!!value.ok);
          if (value.ok) {
            toast('Connected to PVPUtils local service.');
            loadCategories(false);
          }
        })
        .catch(() => {
          setConnected(false);
          toast('Failed to connect to local service.', true);
        });
    }

    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(() => {
        if (document.hidden) return;
        loadCategories(true);
      }, 3000);
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && document.hasFocus()) {
        loadCategories(true);
      }
    });

    function initParticles() {
      const canvas = $('bg-canvas');
      const ctx = canvas.getContext('2d');
      let width = 0;
      let height = 0;
      let points = [];
      let frameId = null;
      let lastTime = 0;
      const FPS_INTERVAL = 1000 / 30;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        const count = width < 640 ? 24 : 40;
        points = Array.from({ length: count }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - .5) * .32,
          vy: (Math.random() - .5) * .32,
          r: Math.random() * 1.4 + .5
        }));
      }

      function frame(timestamp) {
        frameId = requestAnimationFrame(frame);
        const elapsed = timestamp - lastTime;
        if (elapsed < FPS_INTERVAL) return;
        lastTime = timestamp - (elapsed % FPS_INTERVAL);

        ctx.clearRect(0, 0, width, height);
        for (const point of points) {
          point.x += point.vx;
          point.y += point.vy;
          if (point.x < 0) point.x = width;
          if (point.x > width) point.x = 0;
          if (point.y < 0) point.y = height;
          if (point.y > height) point.y = 0;
          ctx.beginPath();
          ctx.arc(point.x, point.y, point.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(140, 240, 111, .55)';
          ctx.fill();
        }
        const maxDist = 120;
        const maxDistSq = maxDist * maxDist;
        ctx.lineWidth = .55;
        for (let i = 0; i < points.length; i++) {
          for (let j = i + 1; j < points.length; j++) {
            const dx = points[i].x - points[j].x;
            const dy = points[i].y - points[j].y;
            const distSq = dx * dx + dy * dy;
            if (distSq < maxDistSq) {
              const opacity = .13 * (1 - Math.sqrt(distSq) / maxDist);
              ctx.beginPath();
              ctx.moveTo(points[i].x, points[i].y);
              ctx.lineTo(points[j].x, points[j].y);
              ctx.strokeStyle = 'rgba(88, 215, 255,' + opacity + ')';
              ctx.stroke();
            }
          }
        }
      }

      resize();
      frameId = requestAnimationFrame(frame);
      window.addEventListener('resize', resize);
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && $('sidebar').classList.contains('open')) {
        closeSidebar();
      }
    });

    initParticles();
    ping();
    startPolling();
  </script>
</body>
